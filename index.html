<!DOCTYPE html>
<html>
<head>
    <title>My Food</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            text-align: center;
        }
        h1 {
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            margin: 15px;
            width: 250px;
        }
        .card img {
            width: 100%;
            height: 180px;
        }
    </style>
</head>

<body>

<h1>My Food</h1>

<div class="container">

    <div class="card">
        <img src="https://www.w3schools.com/w3images/sandwich.jpg">
        <p>A Real NYC Classic</p>
    </div>

    <div class="card">
        <img src="https://www.w3schools.com/w3images/steak.jpg">
        <p>Let Me Tell You About This Steak</p>
    </div>

    <div class="card">
        <img src="https://www.w3schools.com/w3images/cherries.jpg">
        <p>Cherries, interrupted</p>
    </div>

    <div class="card">
        <img src="https://www.w3schools.com/w3images/pasta.jpg">
        <p>Robust Vegetable Pasta</p>
    </div>

</div>

</body>
</html>
